name = "portfolio"
pages_build_output_dir = "."
compatibility_date = "2026-07-01"

# D1 database - stores certificates & projects
[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

# R2 bucket - stores images uploaded from the admin panel (optional but recommended)
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "portfolio-assets"

# Secrets (set via `wrangler pages secret put`, never in this file):
#   SESSION_SECRET      - random string used to sign session cookies
#   PASSWORD_SALT        - random string appended before hashing the admin password
#   ADMIN_USERNAME        - your admin login username
#   ADMIN_PASSWORD_HASH   - sha256(password + PASSWORD_SALT), see README
#   R2_PUBLIC_URL          - public base URL for the ASSETS bucket
